version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: petconnect-postgres
    environment:
      POSTGRES_DB: petconnect
      POSTGRES_USER: petconnect
      POSTGRES_PASSWORD: petconnect123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petconnect -d petconnect"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: petconnect-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
volumes:
  postgres_data:
  redis_data:
