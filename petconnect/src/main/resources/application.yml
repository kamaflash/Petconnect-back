# Application
redis:
  enabled: true
websocket:
  enabled: true

spring:
  application:
    name: petconnect

  # Database - PostgreSQL
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/petconnect}
    username: ${DATASOURCE_USERNAME:petconnect}
    password: ${DATASOURCE_PASSWORD:petconnect123}
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT
jwt:
  access-token:
    secret: ${JWT_ACCESS_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGFjY2VzcyB0b2tlbiBzZWNyZXQga2V5IGZvciBwZXRjb25uZWN0}
    expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-token:
    secret: ${JWT_REFRESH_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHJlZnJlc2ggdG9rZW4gc2VjcmV0IGtleSBmb3IgcGV0Y29ubmVjdA==}
    expiration: ${JWT_REFRESH_EXPIRATION:2592000000}

# Server
server:
  port: ${SERVER_PORT:8080}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Cloudinary
cloudinary:
  enabled: ${CLOUDINARY_ENABLED:false}
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
